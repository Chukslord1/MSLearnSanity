name: Image Validation

on:
  pull_request:
    paths:
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.webp'

jobs:
  check-images:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3


      # 2️⃣ Get changed files
      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v39
        with:
          separator: "\n"


      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests
          pip install openai


      # 4️⃣ Export changed files
      - name: Export changed files
        run: |
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "${{ steps.changed.outputs.all_changed_files }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV


      # 5️⃣ Generate raw GitHub URLs
      - name: Generate GitHub raw URLs
        run: |

          echo "${{ steps.changed.outputs.all_changed_files }}" > files.txt

          while read img; do
            if [[ "$img" =~ \.(png|jpg|jpeg|webp)$ ]]; then

              # Encode filename for URL
              ENCODED=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$img")

              RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.sha }}/$ENCODED"

              # sanitize variable name
              SAFE_NAME=$(basename "$img" | sed 's/[^a-zA-Z0-9]/_/g')

              ENV_NAME="IMAGE_URL_$SAFE_NAME"

              echo "$ENV_NAME=$RAW_URL" >> $GITHUB_ENV

              echo "Set $ENV_NAME → $RAW_URL"

            fi
          done < files.txt


      # 6️⃣ Run checker
      - name: Run image checker
        env:
          SIGHTENGINE_USER: ${{ secrets.SIGHTENGINE_USER }}
          SIGHTENGINE_SECRET: ${{ secrets.SIGHTENGINE_SECRET }}
          GOOGLE_VISION_KEY: ${{ secrets.GOOGLE_VISION_KEY }}
        run: python check_images.py
